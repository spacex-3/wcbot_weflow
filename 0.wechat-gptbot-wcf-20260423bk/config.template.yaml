wechat_addr: 127.0.0.1
wechat_port: 7600
openai_api_base: ''
openai_api_key: YOUR API SECRET KEY
model: gpt-3.5-turbo
role_desc: You are a helpful assistant.
single_chat_prefix:
  - bot
  - '@bot'
chat_group_session_independent: true
use_azure_chatgpt: false
azure_deployment_id: ''
session_expired_duration: 3600
max_tokens: 4000
temperature: 0.9
proxy: ''
create_image_prefix:
  - 画个
  - 画一
  - draw
create_image_model: dall-e-3
create_image_size: 1024x1024
create_image_style: vivid
create_image_quality: hd
clear_current_session_command: '#clear session'
clear_all_sessions_command: '#clear all sessions'
query_key_command: '#query key'
recent_days: 5
plugins:
  - name: tiktok
    command: '#tiktok'
openai_sensitive_id: ''
# WeFlow 配置
wechat_channel: weflow  # 设为 weflow 即可启用新的通道
weflow_http_url: http://127.0.0.1:5031
weflow_ws_url: ws://127.0.0.1:5032
wechat_data_dir: ''
image_xor_key: 0x1F
image_aes_key: ''
quoted_link_fetch_timeout: 10
quoted_link_fetch_max_chars: 12000
quoted_chat_record_link_fetch_limit: 3
quoted_chat_record_link_fetch_max_chars: 4000
assets_retention_days: 7
